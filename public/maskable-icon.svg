<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- 整张满色，maskable 安全区在中心 80%；"A+" 字号缩小至 240 保证不被裁切 -->
  <rect width="512" height="512" fill="url(#bg2)"/>
  <text x="256" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="240" font-weight="800" text-anchor="middle" fill="white" letter-spacing="-8">A+</text>
</svg>
